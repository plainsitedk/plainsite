<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Luna Maria</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #F4EFE6;
      --paper-soft: #EFE8DB;
      --ink: #2C3242;
      --ink-soft: #5D6270;
      --clay: #B98A6E;
      --line: #E4DDD0;
      --line-strong: #CFC6B4;
      --danger: #9B4B3F;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--paper); color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif; font-weight: 300;
      font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    .serif { font-family: 'Cormorant Garamond', serif; }
    input, textarea, button { font: inherit; color: inherit; }
    button { cursor: pointer; }

    .topbar { border-bottom: 1px solid var(--line); background: rgba(244,239,230,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; }
    .topbar-inner { max-width: 960px; margin: 0 auto; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-family: 'Cormorant Garamond', serif; font-size: 22px; }
    .brand em { font-style: italic; color: var(--ink-soft); margin-left: 8px; font-size: 14px; }
    .logout { font-size: 13px; color: var(--ink-soft); background: none; border: 0; padding: 8px 12px; }
    .logout:hover { color: var(--ink); }

    .wrap { max-width: 960px; margin: 0 auto; padding: 48px 32px 120px; }

    .gate { max-width: 420px; margin: 120px auto; padding: 48px 40px; border: 1px solid var(--line); background: var(--paper-soft); border-radius: 4px; }
    .gate h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 40px; margin: 0 0 8px; letter-spacing: -0.02em; }
    .gate p { color: var(--ink-soft); margin: 0 0 24px; }
    .gate input { width: 100%; border: 0; border-bottom: 1px solid var(--line-strong); background: transparent; padding: 12px 2px; font-size: 16px; outline: none; transition: border-color 200ms; }
    .gate input:focus { border-bottom-color: var(--ink); }
    .gate .err { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 22px; border-radius: 999px; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; border: 1px solid var(--ink); background: var(--ink); color: var(--paper); transition: background 200ms, color 200ms, transform 200ms; }
    .btn:hover { transform: translateY(-1px); }
    .btn.ghost { background: transparent; color: var(--ink); }
    .btn.ghost:hover { background: var(--ink); color: var(--paper); }
    .btn.danger { border-color: var(--danger); color: var(--danger); background: transparent; }
    .btn.danger:hover { background: var(--danger); color: var(--paper); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; gap: 20px; flex-wrap: wrap; }
    .head h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 48px; margin: 0; letter-spacing: -0.02em; }
    .head p { color: var(--ink-soft); margin: 6px 0 0; }

    .post-row { display: flex; justify-content: space-between; align-items: center; padding: 22px 0; border-top: 1px solid var(--line); gap: 16px; }
    .post-row:last-child { border-bottom: 1px solid var(--line); }
    .post-row .title { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 24px; letter-spacing: -0.01em; }
    .post-row .meta { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); margin-top: 4px; }
    .post-row .actions { display: flex; gap: 8px; }
    .post-row .mini { padding: 8px 14px; font-size: 12px; border-radius: 999px; border: 1px solid var(--line-strong); background: transparent; color: var(--ink); transition: background 200ms, color 200ms, border-color 200ms; }
    .post-row .mini:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .post-row .mini.danger { color: var(--danger); border-color: var(--danger); }
    .post-row .mini.danger:hover { background: var(--danger); color: var(--paper); }

    .empty { text-align: center; padding: 60px 20px; color: var(--ink-soft); border: 1px dashed var(--line-strong); border-radius: 4px; }

    .editor { display: grid; gap: 20px; }
    .editor label { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); }
    .editor input[type=text] { width: 100%; border: 0; border-bottom: 1px solid var(--line-strong); background: transparent; padding: 14px 2px; font-family: 'Cormorant Garamond', serif; font-size: 32px; outline: none; transition: border-color 200ms; }
    .editor input[type=text]:focus { border-bottom-color: var(--ink); }
    .toolbar { display: flex; gap: 4px; flex-wrap: wrap; padding: 10px; background: var(--paper-soft); border: 1px solid var(--line); border-bottom: 0; border-radius: 4px 4px 0 0; position: sticky; top: 58px; z-index: 5; }
    .toolbar button { padding: 8px 12px; font-size: 13px; background: transparent; border: 1px solid transparent; border-radius: 3px; color: var(--ink-soft); min-width: 36px; }
    .toolbar button:hover { background: var(--paper); color: var(--ink); border-color: var(--line); }
    .toolbar button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .toolbar .sep { width: 1px; background: var(--line); margin: 2px 4px; }
    .rte { min-height: 480px; border: 1px solid var(--line); background: #fff; padding: 40px 48px; font-family: 'Inter', system-ui, sans-serif; font-size: 16px; line-height: 1.75; outline: none; border-radius: 0 0 4px 4px; color: var(--ink); }
    .rte:focus { border-color: var(--ink); }
    .rte:empty::before { content: attr(data-placeholder); color: var(--ink-soft); opacity: 0.6; }
    .rte h2 { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 30px; margin: 1.4em 0 0.4em; letter-spacing: -0.01em; }
    .rte h3 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 23px; margin: 1.1em 0 0.3em; }
    .rte p { margin: 0 0 1em; }
    .rte blockquote { border-left: 2px solid var(--clay); padding: 4px 0 4px 18px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 22px; margin: 1.2em 0; color: var(--ink); }
    .rte a { color: var(--clay); border-bottom: 1px solid var(--clay); }
    .rte ul, .rte ol { margin: 0 0 1em; padding-left: 24px; }
    .rte li { margin-bottom: 6px; }
    .editor .actions { display: flex; gap: 12px; justify-content: flex-end; }
    .editor .hint { font-size: 12px; color: var(--ink-soft); }

    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: var(--paper); padding: 14px 22px; border-radius: 999px; font-size: 13px; letter-spacing: 0.04em; opacity: 0; transform: translateY(10px); transition: opacity 260ms, transform 260ms; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <!-- GATE -->
  <div id="gate">
    <div class="gate">
      <h1 class="serif">Admin</h1>
      <p>Indtast kode for at skrive.</p>
      <form id="gateForm">
        <input id="pw" type="password" placeholder="Adgangskode" autocomplete="current-password" autofocus>
        <div class="err" id="gateErr"></div>
        <div style="margin-top: 24px;"><button class="btn" type="submit">Log ind</button></div>
      </form>
    </div>
  </div>

  <!-- APP -->
  <div id="app" style="display:none;">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">Luna Maria <em>admin</em></div>
        <div>
          <a href="blog.html" class="logout" style="margin-right: 8px;">← Blog</a>
          <button class="logout" id="logoutBtn">Log ud</button>
        </div>
      </div>
    </div>

    <div class="wrap">
      <!-- LIST -->
      <div id="viewList">
        <div class="head">
          <div>
            <h1 class="serif">Skriverier</h1>
            <p>Dine opslag. Klik på et for at redigere.</p>
          </div>
          <button class="btn" id="newBtn">+ Nyt opslag</button>
        </div>
        <div id="posts"></div>
      </div>

      <!-- EDITOR -->
      <div id="viewEdit" style="display:none;">
        <div class="head">
          <div>
            <h1 class="serif" id="editTitle">Nyt opslag</h1>
            <p class="hint" id="editMeta"></p>
          </div>
          <button class="btn ghost" id="backBtn">← Tilbage</button>
        </div>
        <div class="editor">
          <div>
            <label>Titel</label>
            <input type="text" id="titleInput" placeholder="En titel…">
          </div>
          <div>
            <label>Indhold</label>
            <div class="toolbar">
              <button type="button" data-cmd="bold" title="Fed (⌘B)"><strong>B</strong></button>
              <button type="button" data-cmd="italic" title="Kursiv (⌘I)"><em>I</em></button>
              <div class="sep"></div>
              <button type="button" data-block="h2" title="Overskrift">H2</button>
              <button type="button" data-block="h3" title="Underoverskrift">H3</button>
              <button type="button" data-block="p" title="Normal tekst">¶</button>
              <div class="sep"></div>
              <button type="button" data-block="blockquote" title="Citat">❝</button>
              <button type="button" data-cmd="insertUnorderedList" title="Punktliste">• Liste</button>
              <div class="sep"></div>
              <button type="button" data-link="1" title="Link">Link</button>
              <button type="button" data-cmd="unlink" title="Fjern link">Fjern link</button>
              <div class="sep"></div>
              <button type="button" data-cmd="removeFormat" title="Ryd formatering">Ryd</button>
            </div>
            <div id="contentInput" class="rte" contenteditable="true" data-placeholder="Skriv her…"></div>
          </div>
          <div class="actions">
            <button class="btn danger" id="deleteBtn" style="display:none;">Slet</button>
            <button class="btn" id="saveBtn">Gem</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var PW_KEY = 'luna_admin_pw';
    var token = sessionStorage.getItem(PW_KEY) || '';
    var editing = null;

    function toast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); }, 2400);
    }

    function fmtDate(iso) {
      var d = new Date(iso);
      var months = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
      return d.getDate() + '. ' + months[d.getMonth()] + ' ' + d.getFullYear();
    }

    function sanitizePasted(html) {
      var tmp = document.createElement('div');
      tmp.innerHTML = html;
      tmp.querySelectorAll('script,style,meta,link').forEach(function(n){ n.remove(); });
      tmp.querySelectorAll('*').forEach(function(n){
        [].slice.call(n.attributes).forEach(function(a){
          if (a.name !== 'href') n.removeAttribute(a.name);
        });
      });
      return tmp.innerHTML;
    }

    // gate
    document.getElementById('gateForm').addEventListener('submit', function(e){
      e.preventDefault();
      var pw = document.getElementById('pw').value;
      fetch('/api/blog', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + pw, 'Content-Type': 'application/json' }, body: JSON.stringify({ id: '__probe__' }) })
        .then(function(r){
          if (r.status === 401) {
            document.getElementById('gateErr').textContent = 'Forkert kode.';
            return;
          }
          token = pw;
          sessionStorage.setItem(PW_KEY, token);
          showApp();
        })
        .catch(function(){ document.getElementById('gateErr').textContent = 'Kunne ikke forbinde.'; });
    });

    function showApp() {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = '';
      loadPosts();
    }

    document.getElementById('logoutBtn').addEventListener('click', function(){
      sessionStorage.removeItem(PW_KEY);
      token = '';
      document.getElementById('app').style.display = 'none';
      document.getElementById('gate').style.display = '';
      document.getElementById('pw').value = '';
    });

    // list
    function loadPosts() {
      var box = document.getElementById('posts');
      box.innerHTML = '<p style="color:var(--ink-soft);">Henter…</p>';
      fetch('/api/blog').then(function(r){ return r.json(); }).then(function(posts){
        if (!posts || posts.length === 0) {
          box.innerHTML = '<div class="empty"><div class="serif" style="font-size:24px;font-style:italic;margin-bottom:6px;">Ingen opslag endnu.</div>Tryk på "+ Nyt opslag" for at skrive det første.</div>';
          return;
        }
        box.innerHTML = '';
        posts.forEach(function(p){
          var row = document.createElement('div');
          row.className = 'post-row';
          row.innerHTML = '<div><div class="title">' + p.title + '</div><div class="meta">' + fmtDate(p.createdAt) + '</div></div>' +
                          '<div class="actions"><button class="mini" data-edit="' + p.id + '">Rediger</button><button class="mini danger" data-del="' + p.id + '">Slet</button></div>';
          box.appendChild(row);
        });
        box.querySelectorAll('[data-edit]').forEach(function(b){ b.addEventListener('click', function(){ var id = b.getAttribute('data-edit'); openEdit(posts.find(function(p){ return p.id === id; })); }); });
        box.querySelectorAll('[data-del]').forEach(function(b){ b.addEventListener('click', function(){
          if (!confirm('Slet opslaget?')) return;
          var id = b.getAttribute('data-del');
          fetch('/api/blog', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id }) })
            .then(function(r){ if (r.ok) { toast('Slettet.'); loadPosts(); } else toast('Kunne ikke slette.'); });
        }); });
      });
    }

    document.getElementById('newBtn').addEventListener('click', function(){ openEdit(null); });
    document.getElementById('backBtn').addEventListener('click', function(){
      document.getElementById('viewEdit').style.display = 'none';
      document.getElementById('viewList').style.display = '';
      loadPosts();
    });

    var rte = null;
    function openEdit(post) {
      editing = post;
      document.getElementById('viewList').style.display = 'none';
      document.getElementById('viewEdit').style.display = '';
      document.getElementById('editTitle').textContent = post ? 'Rediger' : 'Nyt opslag';
      document.getElementById('editMeta').textContent = post ? 'Oprettet ' + fmtDate(post.createdAt) : '';
      document.getElementById('titleInput').value = post ? post.title : '';
      rte = document.getElementById('contentInput');
      rte.innerHTML = post ? post.content : '';
      document.getElementById('deleteBtn').style.display = post ? '' : 'none';
      try { document.execCommand('defaultParagraphSeparator', false, 'p'); } catch(_){}
    }

    document.addEventListener('paste', function(e){
      if (!rte || document.activeElement !== rte) return;
      e.preventDefault();
      var html = (e.clipboardData || window.clipboardData).getData('text/html');
      var text = (e.clipboardData || window.clipboardData).getData('text/plain');
      var out = html ? sanitizePasted(html) : (text || '').split(/\n\n+/).map(function(p){ return '<p>'+p.replace(/\n/g,'<br>')+'</p>'; }).join('');
      document.execCommand('insertHTML', false, out);
    });

    document.querySelectorAll('.toolbar button').forEach(function(b){
      b.addEventListener('mousedown', function(e){ e.preventDefault(); });
      b.addEventListener('click', function(){
        if (!rte) return;
        rte.focus();
        if (b.dataset.cmd) {
          document.execCommand(b.dataset.cmd, false, null);
        } else if (b.dataset.block) {
          document.execCommand('formatBlock', false, b.dataset.block);
        } else if (b.dataset.link) {
          var url = prompt('Link URL:', 'https://');
          if (url) document.execCommand('createLink', false, url);
        }
        updateToolbarState();
      });
    });

    function updateToolbarState() {
      document.querySelectorAll('.toolbar button[data-cmd]').forEach(function(b){
        try { b.classList.toggle('active', document.queryCommandState(b.dataset.cmd)); } catch(_) {}
      });
      document.querySelectorAll('.toolbar button[data-block]').forEach(function(b){
        try {
          var block = (document.queryCommandValue('formatBlock') || '').toLowerCase();
          b.classList.toggle('active', block === b.dataset.block);
        } catch(_) {}
      });
    }
    document.addEventListener('selectionchange', function(){
      if (document.activeElement && document.activeElement.id === 'contentInput') updateToolbarState();
    });

    document.getElementById('saveBtn').addEventListener('click', function(){
      var title = document.getElementById('titleInput').value.trim();
      var content = document.getElementById('contentInput').innerHTML.trim();
      if (!title) { toast('Giv opslaget en titel.'); return; }
      var body = editing ? { id: editing.id, title: title, content: content } : { title: title, content: content };
      var method = editing ? 'PUT' : 'POST';
      fetch('/api/blog', { method: method, headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
        .then(function(r){ if (!r.ok) throw 0; return r.json(); })
        .then(function(p){
          toast('Gemt.');
          editing = p;
          document.getElementById('deleteBtn').style.display = '';
          document.getElementById('editTitle').textContent = 'Rediger';
          document.getElementById('editMeta').textContent = 'Oprettet ' + fmtDate(p.createdAt);
        })
        .catch(function(){ toast('Kunne ikke gemme.'); });
    });

    document.getElementById('deleteBtn').addEventListener('click', function(){
      if (!editing || !confirm('Slet opslaget?')) return;
      fetch('/api/blog', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify({ id: editing.id }) })
        .then(function(r){ if (r.ok) { toast('Slettet.'); editing = null; document.getElementById('backBtn').click(); } });
    });

    if (token) showApp();
  </script>
</body>
</html>
