<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | plainsite</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "DM Sans", sans-serif; background: #F5F1EC; color: #18161E; -webkit-font-smoothing: antialiased; margin: 0; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: #0A6B46; color: #fff;
      padding: 0.75rem 1.5rem; border-radius: 6px;
      font-family: "DM Sans", sans-serif; font-size: 0.95rem; font-weight: 600;
      border: none; cursor: pointer; transition: background 0.2s;
    }
    .btn:hover { background: #085c3d; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: none; color: rgba(24,22,30,0.5);
      padding: 0.6rem 1rem; border-radius: 6px;
      font-family: "DM Sans", sans-serif; font-size: 0.875rem; font-weight: 500;
      border: 1px solid rgba(24,22,30,0.15); cursor: pointer; transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: rgba(24,22,30,0.3); color: #18161E; }

    .btn-danger {
      background: none; color: rgba(220,50,50,0.7);
      padding: 0.5rem 0.75rem; border-radius: 6px;
      font-family: "DM Sans", sans-serif; font-size: 0.8rem; font-weight: 500;
      border: 1px solid rgba(220,50,50,0.2); cursor: pointer; transition: all 0.2s;
    }
    .btn-danger:hover { background: rgba(220,50,50,0.06); border-color: rgba(220,50,50,0.4); color: rgb(200,40,40); }

    input, textarea {
      width: 100%; background: rgba(24,22,30,0.04);
      border: 1px solid rgba(24,22,30,0.12); border-radius: 8px;
      padding: 0.8rem 1rem;
      font-family: "DM Sans", sans-serif; font-size: 0.95rem; color: #18161E;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus {
      border-color: rgba(10,107,70,0.5);
      box-shadow: 0 0 0 3px rgba(10,107,70,0.1);
    }
    textarea { resize: vertical; min-height: 300px; font-size: 0.9rem; line-height: 1.7; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: rgba(24,22,30,0.6); margin-bottom: 0.4rem; }

    /* ── Login skærm ── */
    #screen-login {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .login-box {
      background: #fff; border: 1px solid rgba(24,22,30,0.08);
      border-radius: 16px; padding: 2.5rem;
      width: 100%; max-width: 380px;
      box-shadow: 0 20px 60px rgba(24,22,30,0.06);
    }

    /* ── Admin skærm ── */
    #screen-admin { display: none; min-height: 100vh; }

    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(245,241,236,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(24,22,30,0.08);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }

    .admin-body {
      max-width: 860px; margin: 0 auto;
      padding: 2.5rem clamp(1.5rem, 5vw, 2rem);
    }

    /* ── Post liste ── */
    #view-list { display: block; }
    #view-editor { display: none; }

    .post-row {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      padding: 1rem 0; border-bottom: 1px solid rgba(24,22,30,0.07);
      flex-wrap: wrap;
    }
    .post-row-info { flex: 1; min-width: 0; }
    .post-row-title {
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 700; font-size: 1rem; color: #18161E;
      letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .post-row-date { font-size: 0.78rem; color: rgba(24,22,30,0.4); margin-top: 0.2rem; }
    .post-row-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

    /* ── Editor ── */
    .editor-header {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 2rem; flex-wrap: wrap;
    }
    .editor-header h2 {
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 700; font-size: 1.4rem; letter-spacing: -0.03em;
      color: #18161E; margin: 0; flex: 1;
    }

    .markdown-hint {
      font-size: 0.75rem; color: rgba(24,22,30,0.35);
      margin-top: 0.5rem; line-height: 1.6;
    }
    .markdown-hint code {
      background: rgba(24,22,30,0.06); border-radius: 3px;
      padding: 0.1em 0.3em; font-size: 0.85em;
    }

    #save-status {
      font-size: 0.8rem; color: #0A6B46; font-weight: 500;
      opacity: 0; transition: opacity 0.3s;
    }
    #save-status.show { opacity: 1; }

    #error-msg {
      font-size: 0.85rem; color: rgb(200,40,40);
      margin-top: 0.5rem; display: none;
    }

    /* ── Editor tabs ── */
    .editor-tabs {
      display: flex; gap: 0; margin-bottom: 0;
    }
    .editor-tab {
      padding: 0.55rem 1.1rem;
      font-family: "DM Sans", sans-serif; font-size: 0.85rem; font-weight: 600;
      border: 1px solid rgba(24,22,30,0.12); background: rgba(24,22,30,0.04);
      color: rgba(24,22,30,0.45); cursor: pointer; transition: all 0.15s;
    }
    .editor-tab:first-child { border-radius: 8px 0 0 0; }
    .editor-tab:last-child  { border-radius: 0 8px 0 0; border-left: none; }
    .editor-tab.active {
      background: #fff; color: #18161E;
      border-bottom-color: #fff;
      position: relative; z-index: 1;
    }

    /* ── Markdown toolbar ── */
    .md-toolbar {
      display: flex; flex-wrap: wrap; gap: 0.3rem;
      padding: 0.6rem 0.75rem;
      background: #fff;
      border: 1px solid rgba(24,22,30,0.12);
      border-top: none; border-bottom: none;
    }
    .md-btn {
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(24,22,30,0.04); border: 1px solid rgba(24,22,30,0.1);
      border-radius: 5px; padding: 0.3rem 0.6rem;
      font-family: "DM Sans", sans-serif; font-size: 0.8rem; font-weight: 600;
      color: rgba(24,22,30,0.7); cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap; line-height: 1.4;
    }
    .md-btn:hover { background: #0A6B46; border-color: #0A6B46; color: #fff; }
    .md-sep { width: 1px; background: rgba(24,22,30,0.1); margin: 0.1rem 0.15rem; align-self: stretch; }

    .md-toolbar + textarea { border-top-left-radius: 0; border-top-right-radius: 0; border-top: none; }

    /* ── Preview panel ── */
    #preview-panel {
      display: none;
      min-height: 300px;
      padding: 1.25rem 1.25rem;
      background: #fff;
      border: 1px solid rgba(24,22,30,0.12);
      border-radius: 0 0 8px 8px;
      border-top: none;
    }
    #preview-panel h1, #preview-panel h2, #preview-panel h3 {
      font-family: "Bricolage Grotesque", sans-serif;
      letter-spacing: -0.03em; color: #18161E; margin-top: 1.5rem;
    }
    #preview-panel h1 { font-size: 1.75rem; font-weight: 800; margin-top: 0; }
    #preview-panel h2 { font-size: 1.3rem; font-weight: 700; }
    #preview-panel h3 { font-size: 1.05rem; font-weight: 700; }
    #preview-panel p  { font-size: 0.95rem; line-height: 1.8; color: rgba(24,22,30,0.75); margin-bottom: 1rem; }
    #preview-panel ul, #preview-panel ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    #preview-panel li { font-size: 0.95rem; line-height: 1.8; color: rgba(24,22,30,0.75); }
    #preview-panel strong { color: #18161E; }
    #preview-panel blockquote {
      border-left: 3px solid rgba(10,107,70,0.4);
      padding-left: 1rem; margin: 1rem 0;
      color: rgba(24,22,30,0.6); font-style: italic;
    }
    #preview-panel hr { border: none; border-top: 1px solid rgba(24,22,30,0.1); margin: 1.5rem 0; }
    #preview-empty {
      color: rgba(24,22,30,0.25); font-size: 0.9rem; font-style: italic;
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="screen-login">
  <div class="login-box">
    <div style="display:flex;align-items:center;gap:0.65rem;margin-bottom:2rem;">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:30px;height:30px;border-radius:6px;overflow:hidden;flex-shrink:0;">
        <rect width="36" height="36" fill="#18161E"/>
        <text x="18" y="18" text-anchor="middle" dominant-baseline="central" fill="#F5F1EC" font-size="12" font-weight="700" font-family="monospace">&lt;/&gt;</text>
      </svg>
      <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.1rem;color:#18161E;letter-spacing:-0.02em;">plainsite</span>
    </div>

    <h1 style="font-family:'Bricolage Grotesque',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:-0.03em;margin:0 0 0.4rem;">Log ind</h1>
    <p style="font-size:0.875rem;color:rgba(24,22,30,0.5);margin:0 0 1.75rem;">Blog administration</p>

    <form id="login-form">
      <div style="margin-bottom:1.25rem;">
        <label for="password-input">Adgangskode</label>
        <input id="password-input" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <p id="login-error" style="font-size:0.85rem;color:rgb(200,40,40);margin:0 0 1rem;display:none;">Forkert adgangskode.</p>
      <button type="submit" class="btn" style="width:100%;justify-content:center;" id="login-btn">Log ind</button>
    </form>
  </div>
</div>

<!-- ── ADMIN ── -->
<div id="screen-admin">

  <div class="topbar">
    <div style="display:flex;align-items:center;gap:0.65rem;">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:28px;height:28px;border-radius:6px;overflow:hidden;flex-shrink:0;">
        <rect width="36" height="36" fill="#18161E"/>
        <text x="18" y="18" text-anchor="middle" dominant-baseline="central" fill="#F5F1EC" font-size="12" font-weight="700" font-family="monospace">&lt;/&gt;</text>
      </svg>
      <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1rem;color:#18161E;letter-spacing:-0.02em;">Blog admin</span>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <a href="/blog" target="_blank" class="btn-ghost">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7H12M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Se blog
      </a>
      <button class="btn-ghost" id="logout-btn">Log ud</button>
    </div>
  </div>

  <div class="admin-body">

    <!-- Liste over opslag -->
    <div id="view-list">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;">
        <h1 style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.75rem;letter-spacing:-0.04em;margin:0;">Opslag</h1>
        <button class="btn" id="new-post-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Nyt opslag
        </button>
      </div>

      <div id="posts-list"></div>
      <p id="no-posts" style="color:rgba(24,22,30,0.35);font-size:0.9rem;display:none;">Ingen opslag endnu. Klik "Nyt opslag" for at komme i gang.</p>
    </div>

    <!-- Editor -->
    <div id="view-editor">
      <div class="editor-header">
        <button class="btn-ghost" id="back-to-list">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 7H2M2 7L6 3M2 7L6 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Tilbage
        </button>
        <h2 id="editor-heading">Nyt opslag</h2>
        <span id="save-status">Gemt!</span>
        <button class="btn" id="save-btn">Gem opslag</button>
      </div>

      <div style="display:flex;flex-direction:column;gap:1.25rem;">
        <div>
          <label for="post-title">Titel</label>
          <input id="post-title" type="text" placeholder="Titel på dit opslag">
        </div>
        <div>
          <label>Indhold</label>
          <div class="editor-tabs">
            <button type="button" class="editor-tab active" id="tab-write">Skriv</button>
            <button type="button" class="editor-tab" id="tab-preview">Forhåndsvisning</button>
          </div>
          <div class="md-toolbar" id="md-toolbar">
            <button type="button" class="md-btn" data-action="h2" title="Stor overskrift">H1</button>
            <button type="button" class="md-btn" data-action="h3" title="Mindre overskrift">H2</button>
            <div class="md-sep"></div>
            <button type="button" class="md-btn" data-action="bold" title="Fed"><b>F</b></button>
            <button type="button" class="md-btn" data-action="italic" title="Kursiv"><i>K</i></button>
            <div class="md-sep"></div>
            <button type="button" class="md-btn" data-action="ul" title="Punktliste">• Liste</button>
            <button type="button" class="md-btn" data-action="ol" title="Nummereret liste">1. Liste</button>
            <div class="md-sep"></div>
            <button type="button" class="md-btn" data-action="quote" title="Citat">❝ Citat</button>
            <button type="button" class="md-btn" data-action="hr" title="Skillelinje">— Linje</button>
          </div>
          <textarea id="post-content" placeholder="Skriv dit opslag her..."></textarea>
          <div id="preview-panel">
            <div id="preview-body"></div>
          </div>
        </div>
        <p id="error-msg">Udfyld venligst både titel og indhold.</p>
      </div>
    </div>

  </div>
</div>

<script>
  const API = 'https://plainsite-blog.tobias-gutkin.workers.dev';
  let token = localStorage.getItem('blog_token') || '';
  let editingSlug = null;

  // ── Auto-login hvis token findes ──
  if (token) showAdmin();

  // ── Login ──
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    btn.disabled = true;
    btn.textContent = 'Logger ind…';
    errEl.style.display = 'none';

    const password = document.getElementById('password-input').value;
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    const data = await res.json();

    if (data.ok) {
      token = data.token;
      localStorage.setItem('blog_token', token);
      showAdmin();
    } else {
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Log ind';
    }
  });

  // ── Log ud ──
  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem('blog_token');
    token = '';
    document.getElementById('screen-admin').style.display = 'none';
    document.getElementById('screen-login').style.display = 'flex';
    document.getElementById('password-input').value = '';
  });

  // ── Vis admin ──
  function showAdmin() {
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-admin').style.display = 'block';
    loadPosts();
  }

  // ── Hent opslag ──
  async function loadPosts() {
    const res = await fetch(`${API}/posts`);
    const posts = await res.json();

    const list = document.getElementById('posts-list');
    const empty = document.getElementById('no-posts');
    list.innerHTML = '';

    if (!posts.length) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    posts.forEach(p => {
      const row = document.createElement('div');
      row.className = 'post-row';
      row.innerHTML = `
        <div class="post-row-info">
          <div class="post-row-title">${escapeHtml(p.title)}</div>
          <div class="post-row-date">${formatDate(p.date)}</div>
        </div>
        <div class="post-row-actions">
          <button class="btn-ghost edit-btn" data-slug="${p.slug}">Rediger</button>
          <button class="btn-danger delete-btn" data-slug="${p.slug}">Slet</button>
        </div>
      `;
      list.appendChild(row);
    });

    list.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', () => openEditor(btn.dataset.slug));
    });
    list.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => deletePost(btn.dataset.slug));
    });
  }

  // ── Nyt opslag ──
  document.getElementById('new-post-btn').addEventListener('click', () => {
    editingSlug = null;
    document.getElementById('editor-heading').textContent = 'Nyt opslag';
    document.getElementById('post-title').value = '';
    document.getElementById('post-content').value = '';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('view-list').style.display = 'none';
    document.getElementById('view-editor').style.display = 'block';
    document.getElementById('post-title').focus();
  });

  // ── Rediger eksisterende ──
  async function openEditor(slug) {
    const res = await fetch(`${API}/posts/${slug}`);
    const post = await res.json();
    editingSlug = slug;
    document.getElementById('editor-heading').textContent = 'Rediger opslag';
    document.getElementById('post-title').value = post.title;
    document.getElementById('post-content').value = post.content;
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('view-list').style.display = 'none';
    document.getElementById('view-editor').style.display = 'block';
    document.getElementById('post-title').focus();
  }

  // ── Gem ──
  document.getElementById('save-btn').addEventListener('click', savePost);

  async function savePost() {
    const title = document.getElementById('post-title').value.trim();
    const content = document.getElementById('post-content').value.trim();
    const errEl = document.getElementById('error-msg');
    const saveBtn = document.getElementById('save-btn');

    if (!title || !content) {
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';
    saveBtn.disabled = true;
    saveBtn.textContent = 'Gemmer…';

    const url = editingSlug ? `${API}/posts/${editingSlug}` : `${API}/posts`;
    const method = editingSlug ? 'PUT' : 'POST';

    const res = await fetch(url, {
      method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
      },
      body: JSON.stringify({ title, content }),
    });

    saveBtn.disabled = false;
    saveBtn.textContent = 'Gem opslag';

    if (res.ok) {
      const status = document.getElementById('save-status');
      status.classList.add('show');
      setTimeout(() => status.classList.remove('show'), 2000);
      if (!editingSlug) {
        // Nyt opslag gemt — tilbage til liste
        setTimeout(() => {
          document.getElementById('view-editor').style.display = 'none';
          document.getElementById('view-list').style.display = 'block';
          loadPosts();
        }, 600);
      } else {
        loadPosts();
      }
    }
  }

  // ── Slet ──
  async function deletePost(slug) {
    if (!confirm('Er du sikker på at du vil slette dette opslag?')) return;
    await fetch(`${API}/posts/${slug}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` },
    });
    loadPosts();
  }

  // ── Tilbage til liste ──
  document.getElementById('back-to-list').addEventListener('click', () => {
    document.getElementById('view-editor').style.display = 'none';
    document.getElementById('view-list').style.display = 'block';
  });

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('da-DK', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Skriv / Forhåndsvisning tabs ──
  document.getElementById('tab-write').addEventListener('click', () => {
    document.getElementById('tab-write').classList.add('active');
    document.getElementById('tab-preview').classList.remove('active');
    document.getElementById('md-toolbar').style.display = 'flex';
    document.getElementById('post-content').style.display = 'block';
    document.getElementById('preview-panel').style.display = 'none';
  });

  document.getElementById('tab-preview').addEventListener('click', () => {
    document.getElementById('tab-preview').classList.add('active');
    document.getElementById('tab-write').classList.remove('active');
    document.getElementById('md-toolbar').style.display = 'none';
    document.getElementById('post-content').style.display = 'none';
    document.getElementById('preview-panel').style.display = 'block';

    const content = document.getElementById('post-content').value.trim();
    const body = document.getElementById('preview-body');
    if (content) {
      body.innerHTML = marked.parse(content);
    } else {
      body.innerHTML = '<p id="preview-empty">Ingen tekst at vise endnu.</p>';
    }
  });

  // ── Markdown toolbar ──
  document.querySelectorAll('.md-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const ta = document.getElementById('post-content');
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      const sel = ta.value.slice(start, end);
      const action = btn.dataset.action;
      let before = '', after = '', insert = '', block = false;

      switch (action) {
        case 'bold':   before = '**'; after = '**'; insert = sel || 'fed tekst'; break;
        case 'italic': before = '*';  after = '*';  insert = sel || 'kursiv tekst'; break;
        case 'h2':     before = '## '; after = ''; insert = sel || 'Overskrift'; block = true; break;
        case 'h3':     before = '### '; after = ''; insert = sel || 'Overskrift'; block = true; break;
        case 'ul':     before = '- '; after = ''; insert = sel || 'Punkt'; block = true; break;
        case 'ol':     before = '1. '; after = ''; insert = sel || 'Punkt'; block = true; break;
        case 'quote':  before = '> '; after = ''; insert = sel || 'Citat'; block = true; break;
        case 'hr':     before = '\n---\n'; after = ''; insert = ''; block = true; break;
      }

      // Sæt blok-elementer på ny linje
      let prefix = '';
      if (block && start > 0 && ta.value[start - 1] !== '\n') prefix = '\n';

      const replacement = prefix + before + insert + after;
      ta.setRangeText(replacement, start, end, 'end');

      // Sæt cursor inden i wrappede tegn
      if (!block && !sel) {
        const cursorPos = start + prefix.length + before.length + insert.length;
        ta.setSelectionRange(start + prefix.length + before.length, cursorPos);
      }
      ta.focus();
    });
  });
</script>
</body>
</html>
